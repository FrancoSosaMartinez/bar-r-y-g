<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Carta | Bar R & G</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="body-carta-clara">

    <header class="header-fijo">
        <nav class="nav-container">
            <div class="nav-side">
                <a href="index.html" class="nav-icon-volver"><i class="fas fa-arrow-left"></i> Volver</a>
            </div>
            <div class="logo-circle">
                <h1>R&G</h1>
            </div>
            <div class="nav-side right"></div>
        </nav>
    </header>

    <main class="contenedor-carta-clara">
        <h2 class="titulo-carta-principal">CARTA</h2>

        <div class="seccion-lineas">
            <h3 class="titulo-flotante-limpio">RACIONES</h3>
            
            <img src="img/nova.png" alt="Nuestras Raciones" class="imagen-seccion">
            
            <div class="lista-items">
                <div class="item-carta">
                    <div class="item-texto">
                        <span class="item-nombre">Hamburguesas</span>
                        <p class="item-desc">Descripción de las hamburguesas.</p>
                    </div>
                    <span class="item-precio">X.XX€</span>
                </div>
                <div class="item-carta">
                    <div class="item-texto">
                        <span class="item-nombre">Salchipapa</span>
                        <p class="item-desc">Descripción de producto.</p>
                    </div>
                    <span class="item-precio">X.XX€</span>
                </div>
            </div>
        </div>

        <div class="seccion-lineas">
            <h3 class="titulo-flotante-limpio">BEBIDAS</h3>
            
            <img src="img/nova.png" alt="Nuestras Bebidas" class="imagen-seccion">
            
            <div class="lista-items">
                <div class="item-carta">
                    <div class="item-texto">
                        <span class="item-nombre">Caña de Cerveza</span>
                    </div>
                    <span class="item-precio">X.XX€</span>
                </div>
                <div class="item-carta">
                    <div class="item-texto">
                        <span class="item-nombre">Refresco</span>
                    </div>
                    <span class="item-precio">X.XX€</span>
                </div>
            </div>
        </div>
    </main>


</body>
</html>
